<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EOS AGENT — Sistema Operativo Artístico</title>
<!-- System fonts only — works on file:// without network -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>

/* ══════════════════════════════════════════════════════
   EOS — INTELLIGENT ACCESS PROTOCOL  vIRON
══════════════════════════════════════════════════════ */
#eosAccess{
  position:fixed;inset:0;z-index:99999;
  background:radial-gradient(ellipse at 50% 40%,#0a0005 0%,#000 70%);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;overflow:hidden;
  font-family:'Courier New',Courier,monospace;
}
#eosAccess.fade-out{
  animation:accessFadeOut 1.6s cubic-bezier(.4,0,.2,1) forwards;
  pointer-events:none;
}
@keyframes accessFadeOut{
  0%{opacity:1;filter:brightness(1);}
  40%{opacity:1;filter:brightness(1.4);}
  100%{opacity:0;filter:brightness(0);}
}

/* ── HUD GRID ────────────────────────────────────────────────── */
#eosAccess::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(200,0,0,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,0,0,.025) 1px,transparent 1px);
  background-size:50px 50px;
  animation:hudGridMove 25s linear infinite;
}
@keyframes hudGridMove{from{background-position:0 0;}to{background-position:50px 50px;}}
#eosAccess::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:linear-gradient(transparent 50%,rgba(200,0,0,.008) 50%);
  background-size:100% 3px;
}

/* ── TOP & BOTTOM BARS ─────────────────────────────────────── */
.acc-topbar{
  position:absolute;top:0;left:0;right:0;height:40px;z-index:5;
  border-bottom:1px solid rgba(200,0,0,.18);
  background:rgba(0,0,0,.6);backdrop-filter:blur(10px);
  display:flex;align-items:center;padding:0 24px;gap:20px;
}
.acc-topbar-logo{font-size:13px;font-weight:700;color:var(--r2);letter-spacing:6px;text-shadow:0 0 15px rgba(200,0,0,.5);}
.acc-topbar-sep{width:1px;height:16px;background:rgba(200,0,0,.3);}
.acc-topbar-sys{font-size:8px;color:rgba(200,0,0,.4);letter-spacing:3px;}
.acc-topbar-right{margin-left:auto;display:flex;align-items:center;gap:16px;}
.acc-topbar-pill{
  font-size:7px;color:rgba(200,0,0,.6);letter-spacing:2px;
  padding:3px 10px;border:1px solid rgba(200,0,0,.25);border-radius:2px;
}
.acc-topbar-time{font-size:10px;color:rgba(200,0,0,.5);letter-spacing:2px;}
.acc-topbar-dot{width:6px;height:6px;border-radius:50%;background:rgba(200,0,0,.7);box-shadow:0 0 6px rgba(200,0,0,.5);animation:accDotPulse 2s ease-in-out infinite;}
@keyframes accDotPulse{0%,100%{opacity:.6;}50%{opacity:1;box-shadow:0 0 10px rgba(200,0,0,.8);}}

.acc-botbar{
  position:absolute;bottom:0;left:0;right:0;height:32px;z-index:5;
  border-top:1px solid rgba(200,0,0,.12);
  background:rgba(0,0,0,.5);
  display:flex;align-items:center;padding:0 24px;gap:24px;
}
.acc-botbar-item{font-size:7px;color:rgba(200,0,0,.25);letter-spacing:2px;}
.acc-botbar-item span{color:rgba(200,0,0,.45);}
.acc-botbar-ml{margin-left:auto;}

/* ── CORNER BRACKETS ───────────────────────────────────────── */
.acc-corner{position:absolute;width:70px;height:70px;z-index:4;}
.acc-corner::before,.acc-corner::after{content:'';position:absolute;background:rgba(200,0,0,.55);}
.acc-corner::before{width:100%;height:1.5px;}
.acc-corner::after{width:1.5px;height:100%;}
.acc-corner.tl{top:48px;left:20px;} .acc-corner.tl::before{top:0;left:0;} .acc-corner.tl::after{top:0;left:0;}
.acc-corner.tr{top:48px;right:20px;transform:scaleX(-1);}
.acc-corner.bl{bottom:40px;left:20px;transform:scaleY(-1);}
.acc-corner.br{bottom:40px;right:20px;transform:scale(-1);}

/* ── SIDE HUD PANELS ───────────────────────────────────────── */
.acc-hud-left,.acc-hud-right{
  position:absolute;top:50%;transform:translateY(-50%);
  z-index:4;display:flex;flex-direction:column;gap:12px;
}
.acc-hud-left{left:28px;align-items:flex-start;}
.acc-hud-right{right:28px;align-items:flex-end;}
.acc-hud-block{
  display:flex;flex-direction:column;gap:4px;
  border-left:2px solid rgba(200,0,0,.25);padding-left:10px;
}
.acc-hud-right .acc-hud-block{border-left:none;border-right:2px solid rgba(200,0,0,.25);padding-left:0;padding-right:10px;align-items:flex-end;}
.acc-hud-label{font-size:6.5px;color:rgba(200,0,0,.35);letter-spacing:2.5px;text-transform:uppercase;}
.acc-hud-val{font-size:11px;font-weight:700;color:rgba(200,0,0,.7);letter-spacing:1px;}
.acc-hud-val.green{color:rgba(34,197,94,.8);}
.acc-hud-val.active{color:rgba(200,0,0,.95);text-shadow:0 0 8px rgba(200,0,0,.5);}
.acc-hud-bar{width:80px;height:2px;background:rgba(200,0,0,.1);}
.acc-hud-bar-fill{height:2px;background:rgba(200,0,0,.6);box-shadow:0 0 4px rgba(200,0,0,.4);transition:width .3s;width:0%;}

/* ── CENTER LAYOUT ─────────────────────────────────────────── */
.acc-center{
  position:relative;z-index:3;
  display:flex;flex-direction:column;align-items:center;gap:0;
}
.acc-logo{
  font-size:72px;font-weight:700;color:var(--r2);letter-spacing:22px;
  text-shadow:0 0 50px rgba(200,0,0,.7),0 0 100px rgba(200,0,0,.25);
  animation:accLogoGlow 5s ease-in-out infinite;
  margin-bottom:4px;
}
@keyframes accLogoGlow{
  0%,100%{text-shadow:0 0 50px rgba(200,0,0,.7),0 0 100px rgba(200,0,0,.25);}
  50%{text-shadow:0 0 70px rgba(200,0,0,1),0 0 140px rgba(200,0,0,.4),0 0 220px rgba(200,0,0,.12);}
}
.acc-subtitle{font-size:8px;color:rgba(200,0,0,.35);letter-spacing:7px;margin-bottom:36px;}
.acc-status{
  font-size:9.5px;color:rgba(200,0,0,.75);letter-spacing:3px;
  min-height:16px;text-align:center;margin-bottom:24px;transition:all .5s;
}
.acc-status.green{color:#22c55e;text-shadow:0 0 12px rgba(34,197,94,.5);}
.acc-status.red{color:#ff5555;text-shadow:0 0 12px rgba(255,85,85,.5);}

/* ── PHASE 1: INIT ─────────────────────────────────────────── */
#accInit{display:flex;flex-direction:column;align-items:center;gap:20px;}
.acc-init-bar-wrap{
  width:300px;height:1px;background:rgba(200,0,0,.12);position:relative;
}
.acc-init-bar{
  height:1px;width:0%;
  background:linear-gradient(90deg,transparent,var(--r2),rgba(255,100,100,.5));
  box-shadow:0 0 10px rgba(200,0,0,.8),0 0 20px rgba(200,0,0,.3);
  transition:width .04s linear;position:relative;
}
.acc-init-bar::after{
  content:'';position:absolute;right:0;top:-1px;width:3px;height:3px;
  border-radius:50%;background:#fff;box-shadow:0 0 5px var(--r2);
}
.acc-init-lines{display:flex;flex-direction:column;gap:6px;margin-top:4px;min-width:300px;}
.acc-init-line{
  font-size:8px;color:rgba(200,0,0,.0);letter-spacing:1.5px;
  transition:color .5s,text-shadow .5s;white-space:nowrap;display:flex;align-items:center;gap:8px;
}
.acc-init-line::before{content:'›';opacity:.5;}
.acc-init-line.visible{color:rgba(200,0,0,.4);}
.acc-init-line.active{color:rgba(200,0,0,.85);text-shadow:0 0 6px rgba(200,0,0,.3);}

/* ── PHASE 2: FACE RECOGNITION ─────────────────────────────── */
#accFace{display:none;flex-direction:column;align-items:center;gap:18px;}
.acc-cam-wrap{position:relative;width:260px;height:260px;}

/* Outer ring — spinning */
.acc-cam-ring1{
  position:absolute;inset:-10px;border-radius:50%;
  border:1px solid rgba(200,0,0,.2);
  border-top-color:rgba(200,0,0,.7);
  animation:camRingSpin1 4s linear infinite;
}
.acc-cam-ring2{
  position:absolute;inset:-22px;border-radius:50%;
  border:1px solid rgba(200,0,0,.1);
  border-right-color:rgba(200,0,0,.4);
  animation:camRingSpin2 7s linear infinite reverse;
}
@keyframes camRingSpin1{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes camRingSpin2{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* Main frame */
.acc-cam-frame{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(200,0,0,.45);
  box-shadow:0 0 30px rgba(200,0,0,.2),0 0 60px rgba(200,0,0,.08),inset 0 0 30px rgba(200,0,0,.06);
}
.acc-cam-frame::before{
  content:'';position:absolute;inset:6px;border-radius:50%;
  border:1px solid rgba(200,0,0,.15);
}
/* Scan line */
.acc-cam-scanline{
  position:absolute;left:0;right:0;top:20%;height:1.5px;
  background:linear-gradient(90deg,transparent 5%,rgba(200,0,0,.9) 50%,transparent 95%);
  box-shadow:0 0 12px rgba(200,0,0,.8),0 2px 20px rgba(200,0,0,.3);
  animation:camScanV 2.8s ease-in-out infinite;
}
@keyframes camScanV{
  0%{top:8%;opacity:0;}5%{opacity:1;}
  95%{opacity:1;}100%{top:92%;opacity:0;}
}
/* Horizontal target lines */
.acc-cam-hline{
  position:absolute;left:20%;right:20%;top:50%;
  height:1px;background:rgba(200,0,0,.15);transform:translateY(-50%);
}
.acc-cam-vline{
  position:absolute;top:20%;bottom:20%;left:50%;
  width:1px;background:rgba(200,0,0,.15);transform:translateX(-50%);
}
/* Corner bracket targets */
.acc-cam-corner{position:absolute;width:22px;height:22px;}
.acc-cam-corner::before,.acc-cam-corner::after{content:'';position:absolute;background:rgba(200,0,0,.9);}
.acc-cam-corner::before{width:100%;height:2px;}
.acc-cam-corner::after{width:2px;height:100%;}
.acc-cam-corner.tl{top:22px;left:22px;} .acc-cam-corner.tl::before,.acc-cam-corner.tl::after{top:0;left:0;}
.acc-cam-corner.tr{top:22px;right:22px;transform:scaleX(-1);}
.acc-cam-corner.bl{bottom:22px;left:22px;transform:scaleY(-1);}
.acc-cam-corner.br{bottom:22px;right:22px;transform:scale(-1);}

#accVideo{
  width:240px;height:240px;object-fit:cover;border-radius:50%;
  position:absolute;top:10px;left:10px;
  filter:grayscale(.2) contrast(1.15) brightness(.95);
}
#accCanvas{
  position:absolute;top:10px;left:10px;
  width:240px;height:240px;border-radius:50%;pointer-events:none;z-index:2;
}

/* Face metrics row */
.acc-face-metrics{
  display:flex;align-items:center;gap:24px;
}
.acc-face-metric{display:flex;flex-direction:column;align-items:center;gap:3px;}
.acc-face-metric-label{font-size:6.5px;color:rgba(200,0,0,.4);letter-spacing:2px;}
.acc-face-metric-val{font-size:18px;font-weight:700;color:rgba(200,0,0,.8);letter-spacing:1px;font-variant-numeric:tabular-nums;}
.acc-face-metric-val.match-val{font-size:32px;text-shadow:0 0 20px rgba(200,0,0,.5);}

/* Main progress */
.acc-face-bar-wrap{
  width:260px;height:2px;background:rgba(200,0,0,.12);position:relative;
}
.acc-face-bar{
  height:2px;background:linear-gradient(90deg,rgba(200,0,0,.5),var(--r2));
  box-shadow:0 0 8px rgba(200,0,0,.7);transition:width .2s;
}
.acc-face-status{font-size:7.5px;color:rgba(200,0,0,.5);letter-spacing:3px;text-align:center;}

.acc-face-skip{
  font-size:8.5px;color:rgba(200,0,0,.45);letter-spacing:2px;
  cursor:pointer;margin-top:6px;transition:color .2s;
  text-decoration:underline;text-underline-offset:3px;
  padding:6px 14px;border:1px solid rgba(200,0,0,.15);
  background:rgba(200,0,0,.04);
}
.acc-face-skip:hover{color:rgba(200,0,0,.85);background:rgba(200,0,0,.1);border-color:rgba(200,0,0,.35);}

/* Enrollment mode */
#accEnroll{display:none;flex-direction:column;align-items:center;gap:14px;}
.acc-enroll-title{font-size:10px;color:rgba(200,0,0,.7);letter-spacing:3px;}
.acc-enroll-desc{font-size:8px;color:rgba(200,0,0,.4);letter-spacing:1.5px;text-align:center;max-width:300px;line-height:1.7;}
.acc-enroll-btn{
  font-size:9px;color:var(--r2);letter-spacing:3px;
  border:1px solid rgba(200,0,0,.4);padding:10px 28px;cursor:pointer;
  background:rgba(200,0,0,.06);transition:all .2s;
}
.acc-enroll-btn:hover{background:rgba(200,0,0,.15);box-shadow:0 0 15px rgba(200,0,0,.2);}
.acc-enroll-progress{font-size:9px;color:rgba(200,0,0,.6);letter-spacing:2px;}

/* ── PHASE 3: PASSPHRASE ───────────────────────────────────── */
#accPass{display:none;flex-direction:column;align-items:center;gap:18px;}
.acc-pass-label{font-size:8px;color:rgba(200,0,0,.4);letter-spacing:4px;}
.acc-pass-wrap{
  display:flex;align-items:center;
  border-bottom:1.5px solid rgba(200,0,0,.35);padding-bottom:10px;
  position:relative;min-width:300px;
}
.acc-pass-prompt{font-size:14px;color:rgba(200,0,0,.45);letter-spacing:2px;padding-right:8px;}
#accPassInput{
  background:none;border:none;outline:none;font-family:'Courier New',monospace;
  font-size:14px;color:var(--r2);letter-spacing:4px;flex:1;caret-color:transparent;
}
#accPassInput::placeholder{color:rgba(200,0,0,.18);letter-spacing:2px;}
.acc-pass-cursor{
  width:2px;height:18px;background:var(--r2);
  animation:accCursorBlink .9s step-end infinite;
  box-shadow:0 0 6px rgba(200,0,0,.6);
}
@keyframes accCursorBlink{0%,100%{opacity:1;}50%{opacity:0;}}
.acc-pass-error{font-size:8px;color:#ff5555;letter-spacing:2px;opacity:0;transition:opacity .3s;}
.acc-pass-error.show{opacity:1;}
.acc-pass-hint{font-size:7px;color:rgba(200,0,0,.18);letter-spacing:2px;margin-top:2px;}

/* ── PHASE 4: ACTIVATION ───────────────────────────────────── */
#accActivation{display:none;flex-direction:column;align-items:center;gap:16px;}
.acc-act-rings{position:relative;width:140px;height:140px;display:flex;align-items:center;justify-content:center;}
.acc-act-r1{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(200,0,0,.35);border-top-color:rgba(200,0,0,.9);
  animation:accRingSpin1 2s linear infinite;
  box-shadow:0 0 20px rgba(200,0,0,.15);
}
.acc-act-r2{
  position:absolute;inset:12px;border-radius:50%;
  border:1px solid rgba(200,0,0,.2);border-bottom-color:rgba(200,0,0,.6);
  animation:accRingSpin2 3s linear infinite;
}
.acc-act-r3{
  position:absolute;inset:24px;border-radius:50%;
  border:1px solid rgba(200,0,0,.15);border-left-color:rgba(200,0,0,.5);
  animation:accRingSpin1 4s linear infinite reverse;
}
.acc-act-core{
  width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle,rgba(200,0,0,.3),rgba(200,0,0,.05));
  border:1px solid rgba(200,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--r2);
  box-shadow:0 0 20px rgba(200,0,0,.3),inset 0 0 10px rgba(200,0,0,.1);
}
.acc-act-lines{display:flex;flex-direction:column;gap:5px;min-width:280px;}
.acc-act-line{
  font-size:7.5px;color:rgba(200,0,0,.0);letter-spacing:2px;
  transition:color .5s;display:flex;align-items:center;gap:8px;
}
.acc-act-line::before{content:'[ ]';opacity:.3;font-size:7px;}
.acc-act-line.on{color:rgba(34,197,94,.8);}
.acc-act-line.on::before{content:'[✓]';color:rgba(34,197,94,.6);}
.acc-act-welcome{
  font-size:20px;font-weight:700;color:var(--r2);letter-spacing:6px;
  text-shadow:0 0 40px rgba(200,0,0,.7),0 0 80px rgba(200,0,0,.25);
  opacity:0;transform:translateY(12px);transition:all 1s cubic-bezier(.4,0,.2,1);
  margin-top:8px;
}
.acc-act-welcome.show{opacity:1;transform:translateY(0);}

/* ── DATA STRIP ────────────────────────────────────────────── */
.acc-datastrip{
  position:absolute;bottom:38px;left:0;right:0;z-index:4;
  display:flex;justify-content:center;gap:50px;
}
.acc-data{font-size:7px;color:rgba(200,0,0,.22);letter-spacing:2px;text-align:center;}
.acc-data span{display:block;color:rgba(200,0,0,.42);font-size:8px;margin-bottom:2px;}

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --r:#c80000;--r2:#ff1a1a;--r3:#ff4444;
  --rg:rgba(200,0,0,.45);--rd:rgba(200,0,0,.08);--rb:rgba(200,0,0,.2);
  --bg:#060608;--s1:rgba(8,8,14,.97);--s2:rgba(12,12,20,.97);--s3:rgba(18,18,28,.98);
  --tx:#e8e8f0;--mid:#6e6e85;--dim:#383848;--bdr:rgba(255,255,255,.04);
  --fn:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI Variable','Segoe UI',system-ui,sans-serif;
  --mo:'SF Mono','Cascadia Code','Consolas','Courier New',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--fn);}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.shell{position:relative;z-index:1;display:flex;height:100vh;overflow:hidden;}

/* VIEW TRANSITIONS */
.view{display:none;width:100%;height:100%;overflow-y:auto;padding:16px;animation:fadeIn .35s ease;}
.view.active{display:flex;flex-direction:column;gap:14px;}
.view::-webkit-scrollbar{width:3px;}
.view::-webkit-scrollbar-thumb{background:var(--rb);border-radius:2px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fl{0%,92%,94%,96%,100%{opacity:1}93%,95%{opacity:.7}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{text-shadow:0 0 22px var(--rg),0 0 45px rgba(200,0,0,.15)}50%{text-shadow:0 0 35px var(--rg),0 0 70px rgba(200,0,0,.25)}}

/* SIDEBAR */
.sb{width:182px;flex-shrink:0;display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(8,5,14,.99),rgba(5,5,10,.99));border-right:1px solid var(--rb);}
.sb-top{padding:16px 14px 13px;border-bottom:1px solid var(--rb);}
.sb-jarvis{font-family:var(--mo);font-size:9px;color:var(--mid);letter-spacing:4px;margin-bottom:2px;}
.sb-eos{font-family:var(--mo);font-size:28px;font-weight:700;color:var(--r2);letter-spacing:5px;line-height:1;animation:fl 7s infinite,glow 4s ease-in-out infinite;}
.sb-greek{font-family:var(--mo);font-size:8px;color:rgba(200,0,0,.5);letter-spacing:3px;margin-top:3px;}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0;}
.sb-nav::-webkit-scrollbar{display:none;}
.sg{font-family:var(--mo);font-size:6.5px;color:var(--dim);letter-spacing:3px;padding:11px 13px 3px;}
.ni{display:flex;align-items:center;gap:8px;padding:7px 13px;cursor:pointer;border-left:2px solid transparent;transition:all .2s;position:relative;}
.ni:hover{background:var(--rd);border-left-color:rgba(200,0,0,.3);}
.ni.on{background:var(--rd);border-left-color:var(--r2);}
.ni-i{font-size:11px;width:14px;text-align:center;opacity:.6;}
.ni-t{font-size:10.5px;font-weight:500;color:var(--mid);transition:color .2s;}
.ni.on .ni-i{opacity:1;}
.ni.on .ni-t{color:var(--tx);}
.ni-b{margin-left:auto;background:var(--r);color:#fff;font-family:var(--mo);font-size:6.5px;padding:1px 5px;border-radius:7px;box-shadow:0 0 8px var(--rg);animation:pulse 2s infinite;}
.sb-agent{padding:12px 13px;border-top:1px solid var(--rb);background:linear-gradient(0deg,rgba(200,0,0,.05),transparent);}
.sa-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sa-orb-wrap{position:relative;width:36px;height:36px;}
.sa-online-dot{position:absolute;bottom:1px;right:1px;width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;border:1.5px solid var(--bg);animation:pulse 2s infinite;}
.sa-name{font-size:11px;font-weight:600;color:var(--tx);}
.sa-st{font-family:var(--mo);font-size:8px;color:#22c55e;letter-spacing:1px;}
.sa-inp-wrap{position:relative;}
.sa-inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--dim);border-radius:6px;color:var(--tx);font-family:var(--fn);font-size:10px;padding:6px 28px 6px 8px;outline:none;transition:border .2s;}
.sa-inp:focus{border-color:rgba(200,0,0,.5);}
.sa-send{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--r2);cursor:pointer;font-size:12px;padding:2px;transition:transform .1s;}
.sa-send:hover{transform:translateY(-50%) scale(1.2);}
.ai-history{overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.ai-history::-webkit-scrollbar{display:none;}
.msg{font-size:10px;line-height:1.55;padding:6px 9px;border-radius:6px;}
.msg.user{background:rgba(200,0,0,.12);color:var(--tx);border:1px solid var(--rb);}
.msg.bot{background:rgba(255,255,255,.02);color:var(--mid);border:1px solid var(--bdr);}
.msg.bot b{color:var(--r2);}

/* MAIN AREA */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:44px;flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--rb);background:rgba(6,6,8,.9);backdrop-filter:blur(10px);}
.tb-title{font-family:var(--mo);font-size:10px;color:var(--mid);letter-spacing:3px;flex:1;transition:all .3s;}
.tb-clock{font-family:var(--mo);font-size:11px;color:var(--r2);}
.tb-status{display:flex;align-items:center;gap:6px;font-family:var(--mo);font-size:8px;color:var(--mid);}
.tb-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;box-shadow:0 0 5px #22c55e;animation:pulse 2s infinite;}
.tb-btn{background:rgba(200,0,0,.1);border:1px solid var(--rb);color:var(--r2);font-family:var(--mo);font-size:8px;padding:4px 10px;border-radius:4px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.tb-btn:hover{background:rgba(200,0,0,.25);border-color:var(--r2);box-shadow:0 0 8px rgba(200,0,0,.3);}
.content{flex:1;overflow:hidden;position:relative;}

/* DASHBOARD */
#view-dashboard{display:none;width:100%;height:100%;overflow:hidden;}
#view-dashboard.active{display:grid;grid-template-columns:200px 170px 1fr 210px 230px;grid-template-rows:1fr 160px 158px;gap:0;}
.p{background:var(--s1);border-right:1px solid var(--rb);border-bottom:1px solid var(--rb);overflow:hidden;position:relative;transition:box-shadow .4s ease;}
.p:hover{box-shadow:inset 0 0 30px rgba(200,0,0,.04);}
.ph{font-family:var(--mo);font-size:7px;color:var(--mid);letter-spacing:3px;padding:10px 12px 6px;border-bottom:1px solid var(--rb);display:flex;align-items:center;gap:6px;position:relative;}
.ph::after{content:'';position:absolute;bottom:0;left:0;width:30px;height:1px;background:var(--r);box-shadow:0 0 6px var(--r);opacity:.6;}
.ph-dot{width:4px;height:4px;border-radius:50%;background:var(--r);box-shadow:0 0 5px var(--r),0 0 10px rgba(200,0,0,.4);animation:ph-pulse 2.5s ease-in-out infinite;}
@keyframes ph-pulse{0%,100%{opacity:1;box-shadow:0 0 5px var(--r),0 0 10px rgba(200,0,0,.4);}50%{opacity:.5;box-shadow:0 0 3px var(--r);}}
.ph-dot{width:4px;height:4px;border-radius:50%;background:var(--r);animation:pulse 3s infinite;}

/* ── FLOATING CHAT BUBBLE ─────────────────────────────────────── */
#floatChatBtn{
  position:fixed;bottom:28px;right:28px;z-index:9999;
  width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,60,60,.25),rgba(200,0,0,.08));
  border:1.5px solid rgba(200,0,0,.5);
  box-shadow:0 0 20px rgba(200,0,0,.35),0 0 40px rgba(200,0,0,.15),inset 0 0 12px rgba(200,0,0,.08);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  animation:fcb-breathe 4s ease-in-out infinite;
}
#floatChatBtn:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px rgba(200,0,0,.55),0 0 60px rgba(200,0,0,.25),inset 0 0 20px rgba(200,0,0,.15);
  border-color:rgba(200,0,0,.9);
}
#floatChatBtn .fcb-inner{
  font-family:var(--mo);font-size:11px;font-weight:700;color:var(--r2);
  letter-spacing:1px;display:flex;flex-direction:column;align-items:center;gap:1px;
}
#floatChatBtn .fcb-icon{font-size:18px;line-height:1;}
#floatChatBtn .fcb-label{font-size:5.5px;letter-spacing:2px;opacity:.7;}
#floatChatBtn .fcb-ping{
  position:absolute;top:4px;right:4px;width:9px;height:9px;border-radius:50%;
  background:var(--r2);box-shadow:0 0 6px var(--r2);
  animation:ph-pulse 2s infinite;
}
@keyframes fcb-breathe{
  0%,100%{box-shadow:0 0 20px rgba(200,0,0,.35),0 0 40px rgba(200,0,0,.15),inset 0 0 12px rgba(200,0,0,.08);}
  50%{box-shadow:0 0 28px rgba(200,0,0,.5),0 0 55px rgba(200,0,0,.22),inset 0 0 18px rgba(200,0,0,.12);}
}

#floatChatPanel{
  position:fixed;bottom:100px;right:28px;z-index:9998;
  width:380px;height:520px;
  background:rgba(6,6,8,.97);
  border:1px solid rgba(200,0,0,.3);
  border-radius:16px;
  box-shadow:0 0 40px rgba(200,0,0,.2),0 20px 60px rgba(0,0,0,.7);
  display:flex;flex-direction:column;overflow:hidden;
  transform:scale(.85) translateY(30px);opacity:0;pointer-events:none;
  transition:all .35s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(20px);
}
#floatChatPanel.open{
  transform:scale(1) translateY(0);opacity:1;pointer-events:all;
}
.fcp-header{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  border-bottom:1px solid rgba(200,0,0,.2);
  background:rgba(200,0,0,.05);flex-shrink:0;
}
.fcp-orb{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 35% 35%,rgba(255,60,60,.3),rgba(200,0,0,.1));
  border:1px solid rgba(200,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  animation:fcb-breathe 3s ease-in-out infinite;
}
.fcp-orb-dot{width:8px;height:8px;border-radius:50%;background:var(--r2);box-shadow:0 0 6px var(--r2);}
.fcp-title-wrap{flex:1;}
.fcp-title{font-family:var(--mo);font-size:9px;color:var(--r2);letter-spacing:3px;}
.fcp-status{font-family:var(--mo);font-size:6.5px;color:var(--dim);letter-spacing:1.5px;margin-top:2px;display:flex;align-items:center;gap:4px;}
.fcp-status-dot{width:4px;height:4px;border-radius:50%;background:#22c55e;box-shadow:0 0 4px #22c55e;animation:ph-pulse 2s infinite;}
.fcp-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:4px;border-radius:6px;transition:all .2s;line-height:1;}
.fcp-close:hover{color:var(--r2);background:rgba(200,0,0,.1);}
.fcp-msgs{
  flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:rgba(200,0,0,.2) transparent;
}
.fcp-msgs::-webkit-scrollbar{width:3px;}
.fcp-msgs::-webkit-scrollbar-thumb{background:rgba(200,0,0,.3);border-radius:2px;}
.fc-msg{display:flex;flex-direction:column;gap:3px;animation:fadeInUp .3s ease;}
.fc-msg.user{align-items:flex-end;}
.fc-msg-meta{font-family:var(--mo);font-size:6px;color:var(--dim);letter-spacing:1px;padding:0 4px;}
.fc-msg-bubble{
  max-width:85%;padding:10px 13px;border-radius:12px;font-size:11px;line-height:1.6;color:var(--tx);
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px 12px 12px 3px;
}
.fc-msg.user .fc-msg-bubble{
  background:rgba(200,0,0,.12);border-color:rgba(200,0,0,.25);border-radius:12px 12px 3px 12px;color:var(--tx);
}
.fcp-suggestions{
  display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;
}
.fcp-suggestions::-webkit-scrollbar{display:none;}
.fcp-sug{
  flex-shrink:0;font-family:var(--mo);font-size:7px;color:var(--mid);letter-spacing:.5px;
  padding:5px 10px;border:1px solid rgba(200,0,0,.2);border-radius:20px;
  cursor:pointer;white-space:nowrap;background:rgba(200,0,0,.04);transition:all .2s;
}
.fcp-sug:hover{border-color:rgba(200,0,0,.5);color:var(--r2);background:rgba(200,0,0,.1);}
.fcp-input-row{
  display:flex;align-items:center;gap:8px;padding:12px 14px;
  border-top:1px solid rgba(200,0,0,.15);flex-shrink:0;
  background:rgba(200,0,0,.02);
}
#floatChatInput{
  flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(200,0,0,.2);
  border-radius:24px;padding:9px 16px;color:var(--tx);font-size:11px;
  font-family:inherit;outline:none;transition:all .2s;
}
#floatChatInput:focus{border-color:rgba(200,0,0,.5);background:rgba(200,0,0,.05);box-shadow:0 0 10px rgba(200,0,0,.1);}
#floatChatInput::placeholder{color:var(--dim);}
#floatSendBtn{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:rgba(200,0,0,.2);border:1px solid rgba(200,0,0,.4);
  color:var(--r2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all .2s;
}
#floatSendBtn:hover{background:rgba(200,0,0,.35);border-color:rgba(200,0,0,.7);box-shadow:0 0 10px rgba(200,0,0,.3);}
.fc-typing{display:flex;gap:4px;align-items:center;padding:10px 13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px 12px 12px 3px;width:fit-content;}
.fc-typing span{width:5px;height:5px;border-radius:50%;background:rgba(200,0,0,.6);animation:fc-dot 1.2s ease-in-out infinite;}
.fc-typing span:nth-child(2){animation-delay:.2s;}
.fc-typing span:nth-child(3){animation-delay:.4s;}
@keyframes fc-dot{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* COMMON */
.card{background:rgba(255,255,255,.02);border:1px solid var(--rb);border-radius:8px;padding:14px;transition:border .2s;}
.card:hover{border-color:rgba(200,0,0,.35);}
.card-title{font-family:var(--mo);font-size:8px;color:var(--r2);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.mod-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--rb);}
.mod-title{font-size:18px;font-weight:700;color:var(--tx);}
.mod-sub{font-family:var(--mo);font-size:8px;color:var(--mid);letter-spacing:2px;margin-top:3px;}
.mod-actions{display:flex;gap:8px;}
.btn{background:rgba(200,0,0,.12);border:1px solid var(--rb);color:var(--r2);font-family:var(--mo);font-size:9px;padding:7px 14px;border-radius:5px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn:hover{background:rgba(200,0,0,.25);border-color:var(--r2);box-shadow:0 0 10px rgba(200,0,0,.2);}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--r);color:#fff;border-color:var(--r);}
.btn-primary:hover{background:var(--r2);box-shadow:0 0 15px rgba(200,0,0,.4);}
.btn-sm{padding:4px 10px;font-size:8px;}
.field{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--dim);border-radius:6px;color:var(--tx);font-family:var(--fn);font-size:12px;padding:9px 12px;outline:none;transition:all .2s;resize:none;}
.field:focus{border-color:rgba(200,0,0,.5);background:rgba(255,255,255,.05);}
.field-select{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--dim);border-radius:6px;color:var(--tx);font-family:var(--fn);font-size:12px;padding:9px 12px;outline:none;transition:border .2s;-webkit-appearance:none;cursor:pointer;}
.field-select:focus{border-color:rgba(200,0,0,.5);}
.field-select option{background:#0d0d15;}
.field-label{font-family:var(--mo);font-size:8px;color:var(--mid);letter-spacing:2px;margin-bottom:5px;display:block;}
.field-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.ai-out{background:rgba(200,0,0,.04);border:1px solid rgba(200,0,0,.18);border-radius:8px;padding:14px;font-size:12px;line-height:1.75;color:var(--tx);white-space:pre-wrap;}
.ai-out.loading::after{content:'';display:inline-block;width:8px;height:8px;border:1.5px solid var(--r2);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin-left:8px;vertical-align:middle;}
.ai-out b{color:var(--r2);}
.items-list{display:flex;flex-direction:column;gap:8px;}
.item-card{background:rgba(255,255,255,.02);border:1px solid var(--rb);border-radius:8px;padding:12px;position:relative;transition:all .2s;animation:slideIn .3s ease;}
.item-card:hover{background:rgba(200,0,0,.05);border-color:rgba(200,0,0,.35);}
.item-card-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;transition:color .2s;line-height:1;}
.item-card-del:hover{color:var(--r2);}
.item-tag{display:inline-block;background:rgba(200,0,0,.12);border:1px solid var(--rb);color:var(--r2);font-family:var(--mo);font-size:7px;padding:2px 8px;border-radius:10px;margin-right:4px;margin-top:5px;letter-spacing:1px;}
.scroll-content{display:flex;flex-direction:column;gap:14px;padding-bottom:24px;}

/* PLATFORM CARDS */
.platform-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.platform-card{background:rgba(255,255,255,.02);border:1px solid var(--dim);border-radius:10px;padding:14px;cursor:pointer;transition:all .25s;text-align:center;}
.platform-card:hover{border-color:var(--rb);background:rgba(200,0,0
